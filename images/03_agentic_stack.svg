<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" width="800" height="600">
  <defs>
    <!-- Highlight sweep gradient -->
    <linearGradient id="sweepGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="white" stop-opacity="0"/>
      <stop offset="0.35" stop-color="white" stop-opacity="0"/>
      <stop offset="0.5" stop-color="white" stop-opacity="0.2"/>
      <stop offset="0.65" stop-color="white" stop-opacity="0"/>
      <stop offset="1" stop-color="white" stop-opacity="0"/>
    </linearGradient>

    <!-- Glow filters -->
    <filter id="glowIndigo" x="-15%" y="-25%" width="130%" height="150%">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feFlood flood-color="#6366F1" flood-opacity="0.25" result="color"/>
      <feComposite in="color" in2="blur" operator="in" result="glow"/>
      <feMerge><feMergeNode in="glow"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glowPurple" x="-15%" y="-25%" width="130%" height="150%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feFlood flood-color="#8B5CF6" flood-opacity="0.25" result="color"/>
      <feComposite in="color" in2="blur" operator="in" result="glow"/>
      <feMerge><feMergeNode in="glow"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glowCyan" x="-15%" y="-25%" width="130%" height="150%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feFlood flood-color="#06B6D4" flood-opacity="0.25" result="color"/>
      <feComposite in="color" in2="blur" operator="in" result="glow"/>
      <feMerge><feMergeNode in="glow"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glowAmber" x="-15%" y="-25%" width="130%" height="150%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feFlood flood-color="#F59E0B" flood-opacity="0.25" result="color"/>
      <feComposite in="color" in2="blur" operator="in" result="glow"/>
      <feMerge><feMergeNode in="glow"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>

    <!-- Clip paths for sweep effect on each layer -->
    <!-- Layer 1 (Skills): x=100, y=420, w=600, h=65 -->
    <clipPath id="clipLayer1"><rect x="100" y="420" width="600" height="65" rx="12"/></clipPath>
    <!-- Layer 2 (Agents): x=150, y=343, w=500, h=65 -->
    <clipPath id="clipLayer2"><rect x="150" y="343" width="500" height="65" rx="12"/></clipPath>
    <!-- Layer 3 (Prompts): x=210, y=266, w=380, h=65 -->
    <clipPath id="clipLayer3"><rect x="210" y="266" width="380" height="65" rx="12"/></clipPath>
    <!-- Layer 4 (Justfile): x=260, y=189, w=280, h=65 -->
    <clipPath id="clipLayer4"><rect x="260" y="189" width="280" height="65" rx="12"/></clipPath>
  </defs>

  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&amp;display=swap');
    text { font-family: 'Inter', system-ui, -apple-system, sans-serif; }
  </style>

  <!-- ============================================================ -->
  <!-- LAYER 1 (BOTTOM): Skills — Capability (indigo) — 600px wide -->
  <!-- ============================================================ -->
  <g filter="url(#glowIndigo)">
    <g>
      <!-- Passive float (10s+) -->
      <animateTransform attributeName="transform" type="translate"
        values="0,0;0,0;0,-2;0,2;0,-1.5;0,1.5;0,0"
        keyTimes="0;0.05;0.2;0.45;0.65;0.85;1"
        dur="6s" begin="10s" repeatCount="indefinite"/>

      <!-- Rect: slides up from below -->
      <rect x="100" y="420" width="600" height="65" rx="12"
            fill="#6366F1" fill-opacity="0.14" stroke="#6366F1" stroke-width="2" opacity="0">
        <animate attributeName="opacity" from="0" to="1" dur="0.6s" begin="0.2s" fill="freeze"
                 calcMode="spline" keySplines="0 0 0.2 1" keyTimes="0;1"/>
        <animate attributeName="y" from="620" to="420" dur="1.4s" begin="0.2s" fill="freeze"
                 calcMode="spline" keySplines="0.16 1 0.3 1" keyTimes="0;1"/>
        <!-- Passive pulse -->
        <animate attributeName="fill-opacity" values="0.14;0.22;0.14" dur="4s" begin="10s" repeatCount="indefinite"/>
      </rect>

      <!-- Name label -->
      <text x="400" y="449" font-size="18" font-weight="700" fill="#E0E0E0" text-anchor="middle" opacity="0">
        Skills
        <animate attributeName="opacity" from="0" to="1" dur="0.5s" begin="1.0s" fill="freeze"/>
      </text>
      <!-- Description -->
      <text x="400" y="472" font-size="14" fill="#9CA3AF" text-anchor="middle" opacity="0">
        Capability
        <animate attributeName="opacity" from="0" to="1" dur="0.5s" begin="1.2s" fill="freeze"/>
      </text>

      <!-- Sweep highlight -->
      <rect x="100" y="420" width="600" height="65" rx="12" fill="url(#sweepGrad)" clip-path="url(#clipLayer1)" opacity="0">
        <animate attributeName="opacity" from="0" to="1" dur="0.05s" begin="9s" fill="freeze"/>
        <animate attributeName="opacity" from="1" to="0" dur="0.3s" begin="9.8s" fill="freeze"/>
        <animateTransform attributeName="transform" type="translate" from="-700,0" to="700,0"
                          dur="0.8s" begin="9s" fill="freeze" calcMode="spline" keySplines="0.4 0 0.2 1" keyTimes="0;1"/>
      </rect>
    </g>
  </g>

  <!-- ============================================================ -->
  <!-- LAYER 2: Agents — Scale + Parallelism (purple) — 500px wide -->
  <!-- ============================================================ -->
  <g filter="url(#glowPurple)">
    <g>
      <animateTransform attributeName="transform" type="translate"
        values="0,0;0,0;0,2;0,-2;0,1.5;0,-1.5;0,0"
        keyTimes="0;0.05;0.2;0.45;0.65;0.85;1"
        dur="6.5s" begin="10.3s" repeatCount="indefinite"/>

      <!-- Rect: slides in from left -->
      <rect x="150" y="343" width="500" height="65" rx="12"
            fill="#8B5CF6" fill-opacity="0.13" stroke="#8B5CF6" stroke-width="1.5" opacity="0">
        <animate attributeName="opacity" from="0" to="1" dur="0.5s" begin="2.0s" fill="freeze"
                 calcMode="spline" keySplines="0 0 0.2 1" keyTimes="0;1"/>
        <animate attributeName="x" from="-550" to="150" dur="1.3s" begin="2.0s" fill="freeze"
                 calcMode="spline" keySplines="0.16 1 0.3 1" keyTimes="0;1"/>
        <animate attributeName="fill-opacity" values="0.13;0.20;0.13" dur="4.2s" begin="10.3s" repeatCount="indefinite"/>
      </rect>

      <text x="400" y="372" font-size="18" font-weight="700" fill="#E0E0E0" text-anchor="middle" opacity="0">
        Agents
        <animate attributeName="opacity" from="0" to="1" dur="0.5s" begin="2.8s" fill="freeze"/>
      </text>
      <text x="400" y="395" font-size="14" fill="#9CA3AF" text-anchor="middle" opacity="0">
        Scale + Parallelism
        <animate attributeName="opacity" from="0" to="1" dur="0.5s" begin="3.0s" fill="freeze"/>
      </text>

      <rect x="150" y="343" width="500" height="65" rx="12" fill="url(#sweepGrad)" clip-path="url(#clipLayer2)" opacity="0">
        <animate attributeName="opacity" from="0" to="1" dur="0.05s" begin="9.15s" fill="freeze"/>
        <animate attributeName="opacity" from="1" to="0" dur="0.3s" begin="9.95s" fill="freeze"/>
        <animateTransform attributeName="transform" type="translate" from="-600,0" to="600,0"
                          dur="0.8s" begin="9.15s" fill="freeze" calcMode="spline" keySplines="0.4 0 0.2 1" keyTimes="0;1"/>
      </rect>
    </g>
  </g>

  <!-- ============================================================ -->
  <!-- LAYER 3: Prompts — Orchestration (cyan) — 380px wide        -->
  <!-- ============================================================ -->
  <g filter="url(#glowCyan)">
    <g>
      <animateTransform attributeName="transform" type="translate"
        values="0,0;0,0;0,-2;0,2;0,-1;0,1;0,0"
        keyTimes="0;0.05;0.22;0.45;0.65;0.85;1"
        dur="7s" begin="10.6s" repeatCount="indefinite"/>

      <!-- Rect: slides in from right -->
      <rect x="210" y="266" width="380" height="65" rx="12"
            fill="#06B6D4" fill-opacity="0.13" stroke="#06B6D4" stroke-width="1.5" opacity="0">
        <animate attributeName="opacity" from="0" to="1" dur="0.5s" begin="4.0s" fill="freeze"
                 calcMode="spline" keySplines="0 0 0.2 1" keyTimes="0;1"/>
        <animate attributeName="x" from="1200" to="210" dur="1.3s" begin="4.0s" fill="freeze"
                 calcMode="spline" keySplines="0.16 1 0.3 1" keyTimes="0;1"/>
        <animate attributeName="fill-opacity" values="0.13;0.20;0.13" dur="4.4s" begin="10.6s" repeatCount="indefinite"/>
      </rect>

      <text x="400" y="295" font-size="18" font-weight="700" fill="#E0E0E0" text-anchor="middle" opacity="0">
        Prompts
        <animate attributeName="opacity" from="0" to="1" dur="0.5s" begin="4.8s" fill="freeze"/>
      </text>
      <text x="400" y="318" font-size="14" fill="#9CA3AF" text-anchor="middle" opacity="0">
        Orchestration
        <animate attributeName="opacity" from="0" to="1" dur="0.5s" begin="5.0s" fill="freeze"/>
      </text>

      <rect x="210" y="266" width="380" height="65" rx="12" fill="url(#sweepGrad)" clip-path="url(#clipLayer3)" opacity="0">
        <animate attributeName="opacity" from="0" to="1" dur="0.05s" begin="9.3s" fill="freeze"/>
        <animate attributeName="opacity" from="1" to="0" dur="0.3s" begin="10.1s" fill="freeze"/>
        <animateTransform attributeName="transform" type="translate" from="-500,0" to="500,0"
                          dur="0.8s" begin="9.3s" fill="freeze" calcMode="spline" keySplines="0.4 0 0.2 1" keyTimes="0;1"/>
      </rect>
    </g>
  </g>

  <!-- ============================================================ -->
  <!-- LAYER 4 (TOP): Justfile — Access (amber) — 280px wide       -->
  <!-- ============================================================ -->
  <g filter="url(#glowAmber)">
    <g>
      <animateTransform attributeName="transform" type="translate"
        values="0,0;0,0;0,2;0,-2;0,1;0,-1;0,0"
        keyTimes="0;0.05;0.22;0.45;0.65;0.85;1"
        dur="7.5s" begin="10.9s" repeatCount="indefinite"/>

      <!-- Rect: slides down from above -->
      <rect x="260" y="189" width="280" height="65" rx="12"
            fill="#F59E0B" fill-opacity="0.13" stroke="#F59E0B" stroke-width="1.5" opacity="0">
        <animate attributeName="opacity" from="0" to="1" dur="0.5s" begin="6.0s" fill="freeze"
                 calcMode="spline" keySplines="0 0 0.2 1" keyTimes="0;1"/>
        <animate attributeName="y" from="-80" to="189" dur="1.3s" begin="6.0s" fill="freeze"
                 calcMode="spline" keySplines="0.16 1 0.3 1" keyTimes="0;1"/>
        <animate attributeName="fill-opacity" values="0.13;0.20;0.13" dur="4.6s" begin="10.9s" repeatCount="indefinite"/>
      </rect>

      <text x="400" y="218" font-size="18" font-weight="700" fill="#E0E0E0" text-anchor="middle" opacity="0">
        Justfile
        <animate attributeName="opacity" from="0" to="1" dur="0.5s" begin="6.8s" fill="freeze"/>
      </text>
      <text x="400" y="241" font-size="14" fill="#9CA3AF" text-anchor="middle" opacity="0">
        Access
        <animate attributeName="opacity" from="0" to="1" dur="0.5s" begin="7.0s" fill="freeze"/>
      </text>

      <rect x="260" y="189" width="280" height="65" rx="12" fill="url(#sweepGrad)" clip-path="url(#clipLayer4)" opacity="0">
        <animate attributeName="opacity" from="0" to="1" dur="0.05s" begin="9.45s" fill="freeze"/>
        <animate attributeName="opacity" from="1" to="0" dur="0.3s" begin="10.25s" fill="freeze"/>
        <animateTransform attributeName="transform" type="translate" from="-400,0" to="400,0"
                          dur="0.8s" begin="9.45s" fill="freeze" calcMode="spline" keySplines="0.4 0 0.2 1" keyTimes="0;1"/>
      </rect>
    </g>
  </g>

  <!-- ============================================================ -->
  <!-- TITLE: "The Agentic Stack"                                   -->
  <!-- ============================================================ -->
  <text x="400" y="100" font-size="28" font-weight="700" fill="#E0E0E0" text-anchor="middle" opacity="0">
    The Agentic Stack
    <animate attributeName="opacity" from="0" to="1" dur="0.8s" begin="8s" fill="freeze"
             calcMode="spline" keySplines="0 0 0.2 1" keyTimes="0;1"/>
  </text>

  <!-- Subtle underline for title -->
  <line x1="290" y1="110" x2="510" y2="110" stroke="#6366F1" stroke-width="1" stroke-opacity="0">
    <animate attributeName="stroke-opacity" from="0" to="0.4" dur="0.6s" begin="8.3s" fill="freeze"/>
    <animate attributeName="stroke-opacity" values="0.4;0.2;0.4" dur="4s" begin="10s" repeatCount="indefinite"/>
  </line>

  <!-- ============================================================ -->
  <!-- BOTTOM LABEL                                                  -->
  <!-- ============================================================ -->
  <text x="400" y="522" font-size="14" fill="#9CA3AF" text-anchor="middle" opacity="0" font-style="italic">
    Each layer builds on the one below
    <animate attributeName="opacity" from="0" to="0.6" dur="0.6s" begin="8.5s" fill="freeze"/>
  </text>

  <!-- Upward arrow hint -->
  <g opacity="0">
    <animate attributeName="opacity" from="0" to="0.4" dur="0.5s" begin="8.7s" fill="freeze"/>
    <polygon points="400,498 394,510 406,510" fill="#9CA3AF" opacity="0.5">
      <animate attributeName="opacity" values="0.5;0.2;0.5" dur="3s" begin="10s" repeatCount="indefinite"/>
    </polygon>
  </g>

  <!-- ============================================================ -->
  <!-- PYRAMID EDGE LINES (decorative)                               -->
  <!-- Faint diagonal lines from bottom corners to top, reinforcing  -->
  <!-- the pyramid shape                                             -->
  <!-- ============================================================ -->
  <g stroke="#9CA3AF" stroke-width="0.8" stroke-opacity="0" fill="none" stroke-dasharray="4 3">
    <animate attributeName="stroke-opacity" from="0" to="0.25" dur="0.6s" begin="8.3s" fill="freeze"/>
    <animate attributeName="stroke-opacity" values="0.25;0.12;0.25" dur="5s" begin="10s" repeatCount="indefinite"/>
    <!-- Left edge: bottom-left of Skills to top-left of Justfile -->
    <line x1="100" y1="485" x2="260" y2="189"/>
    <!-- Right edge: bottom-right of Skills to top-right of Justfile -->
    <line x1="700" y1="485" x2="540" y2="189"/>
  </g>

  <!-- ============================================================ -->
  <!-- LAYER NUMBER BADGES                                           -->
  <!-- ============================================================ -->
  <!-- Badge 1: Skills (bottom) -->
  <g opacity="0">
    <animate attributeName="opacity" from="0" to="1" dur="0.3s" begin="1.5s" fill="freeze"/>
    <circle cx="80" cy="452" r="14" fill="none" stroke="#6366F1" stroke-width="1.5" stroke-opacity="0.5"/>
    <text x="80" y="457" font-size="12" font-weight="700" fill="#6366F1" text-anchor="middle">1</text>
  </g>
  <!-- Badge 2: Agents -->
  <g opacity="0">
    <animate attributeName="opacity" from="0" to="1" dur="0.3s" begin="3.3s" fill="freeze"/>
    <circle cx="130" cy="375" r="13" fill="none" stroke="#8B5CF6" stroke-width="1" stroke-opacity="0.5"/>
    <text x="130" y="380" font-size="12" font-weight="600" fill="#8B5CF6" text-anchor="middle">2</text>
  </g>
  <!-- Badge 3: Prompts -->
  <g opacity="0">
    <animate attributeName="opacity" from="0" to="1" dur="0.3s" begin="5.3s" fill="freeze"/>
    <circle cx="190" cy="298" r="13" fill="none" stroke="#06B6D4" stroke-width="1" stroke-opacity="0.5"/>
    <text x="190" y="303" font-size="12" font-weight="600" fill="#06B6D4" text-anchor="middle">3</text>
  </g>
  <!-- Badge 4: Justfile (top) -->
  <g opacity="0">
    <animate attributeName="opacity" from="0" to="1" dur="0.3s" begin="7.3s" fill="freeze"/>
    <circle cx="242" cy="221" r="13" fill="none" stroke="#F59E0B" stroke-width="1" stroke-opacity="0.5"/>
    <text x="242" y="226" font-size="12" font-weight="600" fill="#F59E0B" text-anchor="middle">4</text>
  </g>
</svg>