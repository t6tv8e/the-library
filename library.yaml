default_dirs:
  skills:
    - default: .claude/skills/
    - global: ~/.claude/skills/
  agents:
    - default: .claude/agents/
    - global: ~/.claude/agents/
  prompts:
    - default: .claude/commands/
    - global: ~/.claude/commands/

library:
  skills:
    - name: agent-browser
      description: Browser automation CLI for AI agents — navigate pages, fill forms, click buttons, take screenshots, extract data, test web apps
      source: https://github.com/vercel-labs/agent-browser/blob/main/skills/agent-browser/SKILL.md

    - name: chrome-cdp
      description: Lightweight Chrome DevTools Protocol CLI — inspect, debug, and interact with local Chrome browser sessions via WebSocket
      source: https://github.com/pasky/chrome-cdp-skill/blob/main/skills/chrome-cdp/SKILL.md

    - name: composition-patterns
      description: React composition patterns that scale — compound components, render props, context providers, and React 19 API changes
      source: https://github.com/vercel-labs/agent-skills/blob/main/skills/composition-patterns/SKILL.md

    - name: deploy-to-vercel
      description: Deploy applications and websites to Vercel — preview and production deployments, project linking, git-push deploys
      source: https://github.com/vercel-labs/agent-skills/blob/main/skills/deploy-to-vercel/SKILL.md

    - name: design-an-interface
      description: Generate multiple radically different interface designs using parallel sub-agents ("Design It Twice")
      source: https://github.com/mattpocock/skills/blob/main/design-an-interface/SKILL.md

    - name: easytranscriber
      description: Transcribe YouTube videos, get summaries, search channels, fetch comments via REST API or MCP
      source: https://github.com/t6tv8e/t6tv8e-agentic-engineering/blob/main/skills/easytranscriber/SKILL.md

    - name: firecrawl
      description: Web scraping, search, crawling, and research with LLM-optimized markdown output — replaces built-in web tools
      source: https://github.com/firecrawl/firecrawl-claude-plugin/blob/main/skills/firecrawl-cli/SKILL.md

    - name: grill-me
      description: Interview the user relentlessly about a plan or design until reaching shared understanding
      source: https://github.com/mattpocock/skills/blob/main/grill-me/SKILL.md

    - name: playwright-cli
      description: Browser automation with Playwright — web testing, form filling, screenshots, data extraction, and page interaction
      source: https://github.com/microsoft/playwright-cli/blob/main/skills/playwright-cli/SKILL.md

    - name: prd-to-plan
      description: Turn a PRD into a multi-phase implementation plan using tracer-bullet vertical slices, saved as Markdown
      source: https://github.com/mattpocock/skills/blob/main/prd-to-plan/SKILL.md

    - name: react-best-practices
      description: React and Next.js performance optimization guidelines from Vercel Engineering — 64 rules across 8 categories
      source: https://github.com/vercel-labs/agent-skills/blob/main/skills/react-best-practices/SKILL.md

    - name: react-native-skills
      description: React Native and Expo best practices for performant mobile apps — animations, lists, native modules, platform APIs
      source: https://github.com/vercel-labs/agent-skills/blob/main/skills/react-native-skills/SKILL.md

    - name: request-refactor-plan
      description: Create a detailed refactor plan with tiny commits via user interview, filed as a GitHub issue
      source: https://github.com/mattpocock/skills/blob/main/request-refactor-plan/SKILL.md

    - name: setup-pre-commit
      description: Set up Husky pre-commit hooks with lint-staged (Prettier), type checking, and tests
      source: https://github.com/mattpocock/skills/blob/main/setup-pre-commit/SKILL.md

    - name: skill-creator
      description: Create new skills, modify and improve existing skills, run evals, and benchmark skill performance
      source: https://github.com/anthropics/skills/blob/main/skills/skill-creator/SKILL.md

    - name: tdd
      description: Test-driven development with red-green-refactor loop for building features or fixing bugs
      source: https://github.com/mattpocock/skills/blob/main/tdd/SKILL.md

    - name: vercel-cli-with-tokens
      description: Deploy and manage Vercel projects using token-based CLI authentication without interactive login
      source: https://github.com/vercel-labs/agent-skills/blob/main/skills/vercel-cli-with-tokens/SKILL.md

    - name: web-design-guidelines
      description: Review UI code for Web Interface Guidelines compliance — accessibility, UX audits, design best practices
      source: https://github.com/vercel-labs/agent-skills/blob/main/skills/web-design-guidelines/SKILL.md

    - name: write-a-prd
      description: Create a PRD through user interview, codebase exploration, and module design, submitted as GitHub issue
      source: https://github.com/mattpocock/skills/blob/main/write-a-prd/SKILL.md

  agents:
    - name: agentic-web-browsing-agent
      description: General-purpose agentic web browsing agent — browses sites, fills forms, posts content, places orders, extracts data
      source: /Users/t6t/src/t6tv8e-agentic-engineering/agents/agentic-web-browsing-agent/AGENTS.md
      requires: [skill:agent-browser, skill:playwright-cli, skill:firecrawl]
  prompts:
    - name: skill-gen
      description: Generate a complete Agent Skill from a documentation URL using Firecrawl scraping
      source: https://github.com/firecrawl/firecrawl-claude-plugin/blob/main/commands/skill-gen.md
      requires: [skill:firecrawl]
